<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- iOS "Add to Home Screen": run fullscreen with a transparent status bar
         (content renders behind the clock/battery). Status bar icons are white. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>iNat Territory</title>
    <script>
      // Flag standalone (installed PWA) mode on <html> before first paint so the
      // app-shell height rule in index.css can use 100vh (true full screen) only
      // there, and 100dvh in a normal browser tab (tracks the address bar).
      //
      // We can't rely on CSS @media (display-mode: standalone) alone: iOS
      // home-screen apps use the legacy apple-mobile-web-app-capable meta with
      // no web manifest, so they never report a display-mode to CSS.
      // navigator.standalone is the iOS signal; matchMedia covers other
      // platforms' manifest-based PWAs.
      (function () {
        var standalone =
          window.navigator.standalone === true ||
          ["standalone", "fullscreen", "minimal-ui"].some(function (m) {
            return window.matchMedia("(display-mode: " + m + ")").matches
          })
        if (standalone) document.documentElement.setAttribute("data-standalone", "")
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
